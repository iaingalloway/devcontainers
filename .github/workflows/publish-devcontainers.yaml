name: Publish devcontainers

on:
  pull_request:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'

jobs:
  publish-base:
    runs-on: ubuntu-latest
    steps:
      - name: Publish base devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: base
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-dotnet:
    runs-on: ubuntu-latest
    needs:
      - publish-base
    steps:
      - name: Publish dotnet devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: dotnet
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-go:
    runs-on: ubuntu-latest
    needs:
      - publish-base
    steps:
      - name: Publish go devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: go
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-hugo:
    runs-on: ubuntu-latest
    needs:
      - publish-base
    steps:
      - name: Publish dotnet devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: hugo
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-javascript:
    runs-on: ubuntu-latest
    needs:
      - publish-base
    steps:
      - name: Publish dotnet devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: javascript
          github-token: ${{ secrets.GITHUB_TOKEN }}
          component-name: node

  publish-python:
    runs-on: ubuntu-latest
    needs:
      - publish-base
    steps:
      - name: Publish dotnet devcontainer
        uses: iaingalloway/devcontainers/.github/actions/publish-devcontainer@121fe35714d04b5359994afd4aa77512b2825d6f
        with:
          image: python
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-workflows:
      runs-on: ubuntu-latest
      permissions:
        actions: write
        contents: read
      steps:
        - name: Delete workflow runs
          uses: Mattraks/delete-workflow-runs@39f0bbed25d76b34de5594dceab824811479e5de
          with:
            token: ${{ github.token }}
            repository: ${{ github.repository }}
            retain_days: 30
            keep_minimum_runs: 5
